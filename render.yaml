services:
  - type: web
    name: ancra
    runtime: go
    repo: https://github.com/abdulsalamcodes/Ancra
    buildCommand: go build -o bin/ancra ./cmd/api
    startCommand: ./bin/ancra
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: ancra-db
          property: connectionString
      - key: NOMBA_BASE_URL
        value: https://api.nomba.com/v1
      - key: SWEEP_INTERVAL_SECONDS
        value: 60
      - key: NOMBA_CLIENT_ID
        sync: false
      - key: NOMBA_CLIENT_SECRET
        sync: false
      - key: NOMBA_ACCOUNT_ID
        sync: false
      - key: NOMBA_SUB_ACCOUNT_ID
        sync: false
      - key: NOMBA_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: API_KEY
        generateValue: true
      - key: WEBHOOK_ENDPOINT
        sync: false

databases:
  - name: ancra-db
    databaseName: ancra
    user: ancra
    plan: free
